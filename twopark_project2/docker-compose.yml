services:
  collector:
    build:
      context: ./collector
    volumes:
      - shared-html:/shared
    restart: always

  flask-api:
    build:
      context: ./flask-api
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - shared-html:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - collector
      - flask-api
    restart: always

volumes:
  shared-html: